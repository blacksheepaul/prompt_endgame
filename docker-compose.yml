version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prompt_endgame
    ports:
      - "10080:8080"
    environment:
      - SERVER_ADDR=:8080
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:10080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
