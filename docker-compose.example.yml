services:
  endgame:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prompt_endgame
    ports:
      - "10180:8080"
    env_file:
      - .env
    environment:
      - SERVER_ADDR=:8080
      - LOG_LEVEL=info
    restart: unless-stopped
    networks:
      - monitoring
      - llm_fakellm-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  monitoring:
    external: true
  llm_fakellm-net:
    external: true